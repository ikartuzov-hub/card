<style>
:root{
  --bg:#0C3B42; --card:#14555E; --card2:#0A3038; --line:#2C6F79;
  --tx:#FFFFFF; --tx2:#B9E2E9; --tx3:#7FC3CE; --tx4:#4E97A3;
  --acc:#5DCAA5; --acc-deep:#0F6E56; --acc-btn:#1D9E75; --on-acc:#04342C;
}
html[data-theme="light"]{
  --bg:#F2F8F9; --card:#FFFFFF; --card2:#E8F2F4; --line:#CBE3E8;
  --tx:#0A2E34; --tx2:#3C6B74; --tx3:#5A8A93; --tx4:#7FA5AC;
  --acc:#0F6E56; --acc-deep:#D6EFE6; --acc-btn:#0F6E56; --on-acc:#FFFFFF;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0; background:var(--bg); color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased; transition:background .25s;
}
.hero{position:fixed;inset:0 0 auto;height:340px;z-index:0;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;opacity:.30;display:block}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,59,66,.55) 0%,var(--bg) 92%)}
html[data-theme="light"] .hero:after{background:linear-gradient(180deg,rgba(242,248,249,.55) 0%,var(--bg) 92%)}
.wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:16px 16px 28px}
.top{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.mark{width:26px;height:26px;flex:none}
.spacer{flex:1}
.chip{border:.5px solid var(--line);color:var(--tx3);font-size:12px;padding:6px 10px;border-radius:14px;background:transparent;cursor:pointer;font-family:inherit;line-height:1}
.chip:active{transform:scale(.96)}
.who{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ava{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--card);flex:none}
.nm{font-size:13px;font-weight:600;line-height:1.3}
.sub{font-size:11px;color:var(--tx3);line-height:1.3}
h1{font-size:22px;font-weight:600;line-height:1.28;margin:0 0 18px}
.offer{display:block;background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;text-decoration:none;color:inherit;border-left:3px solid transparent}
.offer.lead{border-left-color:var(--acc)}
.offer:active{transform:scale(.99)}
.oh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.oi{width:18px;height:18px;flex:none;stroke:var(--acc)}
.ot{font-size:15px;font-weight:600;line-height:1.3}
.od{font-size:13px;color:var(--tx2);line-height:1.5}
.badge{display:inline-block;margin-top:8px;background:var(--acc-deep);color:var(--acc);font-size:12px;font-weight:600;padding:4px 10px;border-radius:10px}
html[data-theme="light"] .badge{color:#0F6E56}
.icons{display:flex;gap:8px;margin:18px 0 12px}
.ic{flex:1;background:var(--card);border-radius:12px;padding:13px 0;display:flex;align-items:center;justify-content:center;text-decoration:none}
.ic.primary{background:var(--acc-btn)}
.ic svg{width:20px;height:20px;stroke:var(--tx2);fill:none;stroke-width:1.8}
.ic.primary svg{stroke:var(--on-acc)}
.save{display:block;width:100%;background:var(--card2);border:none;border-radius:12px;padding:13px;color:var(--tx3);font-size:13px;font-family:inherit;cursor:pointer;text-align:center}
.foot{text-align:center;padding-top:16px;margin-top:16px;border-top:.5px solid var(--line)}
.foot svg{width:20px;height:20px;opacity:.75}
.fl{color:var(--tx4);font-size:11px;margin-top:6px;line-height:1.6}
.fl a{color:var(--tx4)}
</style>
</head>
<body>

      <span class="ot" data-t="o3t"></span>

  <div class="icons" id="contact">
    <a class="ic primary" href="https://t.me/igor_kartuzov" aria-label="Telegram"><svg viewBox="0 0 24 24"><path d="M15 10l-4 4 6 6 4-16-18 7 4 2 2 6 3-4"/></svg></a>
    <a class="ic" href="https://wa.me/351912916273" aria-label="WhatsApp"><svg viewBox="0 0 24 24"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/><path d="M9 10a.5.5 0 0 0 1 0V9a.5.5 0 0 0-1 0v1a5 5 0 0 0 5 5h1a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1"/></svg></a>

    <a class="ic" href="mailto:i.kartuzov@gmail.com" aria-label="Email"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></a>
    <a class="ic" href="https://www.linkedin.com/in/igor-kartuzov" aria-label="LinkedIn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 11v5M8 8v.01M12 16v-5M16 16v-3a2 2 0 0 0-4 0"/></svg></a>

    <div class="fl">

      © Igor Kartuzov · SeedWave

</div>

<script>
const L = {
  pt:{sub:"35 anos em negócios reais · Madeira",
      h1:"Três formas de o seu dinheiro trabalhar na Madeira",
      o1t:"Cooperativa · imóveis a partir de 5 000 €",
      o1d:"Compra coletiva ao abrigo da lei portuguesa. O primeiro imóvel está comprado e a funcionar.",
      o1b:"Isenção de IRC, IMT e IMI",
      o2t:"Apoios para o seu negócio",
      o2d:"O Estado devolve até 80% do investimento. Encontro o programa, trato de tudo, acompanho até ao pagamento.",
      o3t:"Da ideia a um produto vivo",
      o3d:"Aplicação, bot, serviço. Semanas em vez de meses, sem equipa própria.",
      save:"Guardar contacto", projects:"Projetos do estúdio", personal:"Cartão pessoal"},
  en:{sub:"35 years in real business · Madeira",
      h1:"Three ways to put your money to work in Madeira",
      o1t:"Cooperative · property from €5,000",
      o1d:"Collective purchase under Portuguese law. The first property is bought and running.",
      o1b:"Exempt from IRC, IMT and IMI",
      o2t:"Grants for your business",
      o2d:"The state returns up to 80% of your investment. I find the programme, handle the paperwork, follow it to payment.",
      o3t:"From idea to a live product",
      o3d:"App, bot, service. Weeks instead of months, without your own dev team.",
      save:"Save contact", projects:"Studio projects", personal:"Personal card"},
  ru:{sub:"35 лет в реальном бизнесе · Мадейра",
      h1:"Три формы, как ваши деньги работают на Мадейре",
      o1t:"Кооператив · недвижимость от 5 000 €",
      o1d:"Коллективная покупка по португальскому праву. Первый объект куплен и работает.",
      o1b:"Освобождение от IRC, IMT и IMI",
      o2t:"Субсидии для вашего бизнеса",
      o2d:"Государство возвращает до 80% инвестиций. Нахожу программу, оформляю, веду до выплаты.",
      o3t:"Из идеи — работающий продукт",
      o3d:"Приложение, бот, сервис. Недели вместо месяцев, без своей команды разработчиков.",
      save:"Сохранить контакт", projects:"Проекты студии", personal:"Личная карточка"},
  es:{sub:"35 años en negocios reales · Madeira",
      h1:"Tres formas de que su dinero trabaje en Madeira",
      o1t:"Cooperativa · inmuebles desde 5 000 €",
      o1d:"Compra colectiva bajo la ley portuguesa. El primer inmueble está comprado y en funcionamiento.",
      o1b:"Exención de IRC, IMT e IMI",
      o2t:"Ayudas para su negocio",
      o2d:"El Estado devuelve hasta el 80% de la inversión. Encuentro el programa, lo tramito y lo acompaño hasta el pago.",
      o3t:"De la idea a un producto vivo",
      o3d:"Aplicación, bot, servicio. Semanas en vez de meses, sin equipo propio.",
      save:"Guardar contacto", projects:"Proyectos del estudio", personal:"Tarjeta personal"},
  de:{sub:"35 Jahre im realen Geschäft · Madeira",
      h1:"Drei Wege, wie Ihr Geld auf Madeira arbeitet",
      o1t:"Genossenschaft · Immobilien ab 5 000 €",
      o1d:"Gemeinsamer Kauf nach portugiesischem Recht. Das erste Objekt ist gekauft und in Betrieb.",
      o1b:"Befreiung von IRC, IMT und IMI",
      o2t:"Förderungen für Ihr Unternehmen",
      o2d:"Der Staat erstattet bis zu 80% der Investition. Ich finde das Programm, erledige die Formalitäten und begleite bis zur Auszahlung.",
      o3t:"Von der Idee zum lebenden Produkt",
      o3d:"App, Bot, Service. Wochen statt Monate, ohne eigenes Team.",
      save:"Kontakt speichern", projects:"Studio-Projekte", personal:"Persönliche Karte"}
};
const ORDER = ["pt","en","ru","es","de"];
const P = new URLSearchParams(location.search);
let lang = P.get("lang");
if(!ORDER.includes(lang)){
  const n = (navigator.language||"pt").slice(0,2).toLowerCase();
  lang = ORDER.includes(n) ? n : "pt";
}
function render(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-t]").forEach(el=>{
    const v = L[lang][el.dataset.t]; if(v) el.textContent = v;
  });
  document.getElementById("langBtn").textContent = lang.toUpperCase();
  document.querySelectorAll('a[href^="http"], a[href="../"]').forEach(a=>{
    if(a.href.indexOf("t.me")>-1||a.href.indexOf("wa.me")>-1||a.href.indexOf("linkedin")>-1) return;
    const u = new URL(a.href, location.href); u.searchParams.set("lang", lang); a.href = u.toString();
  });
}
document.getElementById("langBtn").onclick = ()=>{
  lang = ORDER[(ORDER.indexOf(lang)+1) % ORDER.length];
  const u = new URL(location.href); u.searchParams.set("lang", lang); history.replaceState(null,"",u);
  render();
};
let theme = "dark";
try{ theme = localStorage.getItem("sw-theme") || "dark"; }catch(e){}
function applyTheme(){
  document.documentElement.dataset.theme = theme;
  document.getElementById("themeBtn").textContent = theme === "dark" ? "☾" : "☀";
  try{ localStorage.setItem("sw-theme", theme); }catch(e){}
}
document.getElementById("themeBtn").onclick = ()=>{ theme = theme==="dark"?"light":"dark"; applyTheme(); };
document.getElementById("saveBtn").onclick = ()=>{
  const v = ["BEGIN:VCARD","VERSION:3.0","N:Kartuzov;Igor;;;","FN:Igor Kartuzov",
    "ORG:SeedWave","TITLE:"+L[lang].sub,
    "TEL;TYPE=CELL:+351912916273","EMAIL:i.kartuzov@gmail.com",
    "URL:https://ikartuzov-hub.github.io/card/biz/",
    "X-SOCIALPROFILE;TYPE=telegram:https://t.me/igor_kartuzov",
    "X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/igor-kartuzov",
    "ADR;TYPE=WORK:;;Funchal;;;;Portugal","END:VCARD"].join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([v],{type:"text/vcard"}));
  a.download = "Igor_Kartuzov.vcf"; a.click();
};
applyTheme(); render();
</script>
